# Main Home Assistant configuration for the homelab instance.
homeassistant:
  name: Carhart Household
  unit_system: us_customary
  time_zone: America/New_York

default_config:

frontend:
  themes: !include_dir_merge_named themes

lovelace:
  resource_mode: yaml
  dashboards:
    kitchen-dashboard:
      mode: yaml
      title: Kitchen
      icon: mdi:chef-hat
      show_in_sidebar: true
      filename: dashboards/dashboard-kitchen.yaml

# REST-backed Mealie sensors. Prefer the official HA Mealie integration when it
# exposes the data you need; keep this include for shopping-list gaps.
rest: !include rest_mealie.yaml

# Kitchen-specific template sensors and derived values.
template: !include templates_kitchen.yaml
