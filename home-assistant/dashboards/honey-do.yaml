title: Honey Do
views:
  - title: Honey Do
    path: honey-do
    icon: mdi:home-heart
    theme: Skylight Sand
    type: custom:grid-layout
    badges: []
    layout:
      grid-template-columns: repeat(12, minmax(0, 1fr))
      grid-template-areas: |
        "hero hero hero hero hero hero hero hero hero hero hero hero"
        "summary summary summary summary recurring recurring recurring recurring projects projects projects projects"
        "summary summary summary summary recurring recurring recurring recurring projects projects projects projects"
      grid-template-rows: min-content minmax(220px, auto) minmax(220px, auto)
      grid-gap: 20px
      margin: 20px
      mediaquery:
        "(max-width: 1100px)":
          grid-template-columns: 1fr
          grid-template-areas: |
            "hero"
            "summary"
            "recurring"
            "projects"

    cards:
      - type: custom:mushroom-template-card
        view_layout:
          grid-area: hero
        primary: Honey Do List
        secondary: >
          {{ state_attr('sensor.honey_do_project_summary', 'remaining') }} projects left,
          {{ state_attr('sensor.honey_do_recurring_summary', 'claimed') }} recurring chores claimed this week.
        icon: mdi:home-heart
        icon_color: brown
        multiline_secondary: true
        fill_container: true
        card_mod:
          style: |
            ha-card {
              padding: 22px 24px;
              border-radius: 32px;
              background: linear-gradient(160deg, rgba(245, 235, 224, 0.94), rgba(227, 213, 202, 0.78));
              border: 1px solid rgba(124, 108, 97, 0.10);
              box-shadow: 0 18px 40px rgba(125, 107, 93, 0.12);
            }
            mushroom-shape-icon {
              --shape-color: rgba(213, 189, 175, 0.28) !important;
            }
            .primary {
              font-size: 2rem !important;
              font-weight: 700 !important;
              letter-spacing: -0.03rem;
            }
            .secondary {
              font-size: 1rem !important;
              line-height: 1.5 !important;
              color: var(--secondary-text-color) !important;
            }

      - type: vertical-stack
        view_layout:
          grid-area: summary
        cards:
          - type: custom:mushroom-template-card
            primary: Projects
            secondary: >
              {{ states('sensor.honey_do_project_summary') }} of
              {{ state_attr('sensor.honey_do_project_summary', 'total') }} complete
            icon: mdi:hammer-wrench
            icon_color: brown
            fill_container: true
            card_mod:
              style: |
                ha-card {
                  padding: 18px;
                  border-radius: 28px;
                  background: rgba(245, 235, 224, 0.76);
                }
          - type: custom:mushroom-template-card
            primary: Recurring Chores
            secondary: >
              {{ states('sensor.honey_do_recurring_summary') }} of
              {{ state_attr('sensor.honey_do_recurring_summary', 'total') }} done this week
            icon: mdi:refresh-circle
            icon_color: teal
            fill_container: true
            card_mod:
              style: |
                ha-card {
                  padding: 18px;
                  border-radius: 28px;
                  background: rgba(245, 235, 224, 0.76);
                }
          - type: markdown
            content: |
              ## How This Board Works
              - Recurring chores start unclaimed each Monday at 5:00 AM.
              - Claim a chore by choosing Ross or Kelly, then toggle it done when finished.
              - Projects are fixed-owner honey-do items with target dates.
            card_mod:
              style: |
                ha-card {
                  padding: 18px 20px;
                  border-radius: 28px;
                  background: rgba(245, 235, 224, 0.76);
                }

      - type: vertical-stack
        view_layout:
          grid-area: recurring
        cards:
          - type: markdown
            content: |
              ## Recurring Chores
              Claim from the dashboard, then mark complete for the week.
            card_mod:
              style: |
                ha-card {
                  padding: 18px 20px 6px;
                  border-radius: 28px 28px 0 0;
                  background: rgba(245, 235, 224, 0.82);
                }
          - type: entities
            title: ''
            show_header_toggle: false
            entities:
              - entity: input_select.honey_do_claim_walk_the_dog
                name: Walk the dog
              - entity: input_boolean.honey_do_done_walk_the_dog
                name: Walk the dog complete
              - type: section
              - entity: input_select.honey_do_claim_vacuum
                name: Vacuum
              - entity: input_boolean.honey_do_done_vacuum
                name: Vacuum complete
              - type: section
              - entity: input_select.honey_do_claim_clean_upstairs_bathroom
                name: Clean upstairs bathroom
              - entity: input_boolean.honey_do_done_clean_upstairs_bathroom
                name: Upstairs bathroom complete
              - type: section
              - entity: input_select.honey_do_claim_clean_living_room_bathroom
                name: Clean living room bathroom
              - entity: input_boolean.honey_do_done_clean_living_room_bathroom
                name: Living room bathroom complete
              - type: section
              - entity: input_select.honey_do_claim_clean_downstairs_bathroom
                name: Clean downstairs bathroom
              - entity: input_boolean.honey_do_done_clean_downstairs_bathroom
                name: Downstairs bathroom complete
              - type: section
              - entity: input_select.honey_do_claim_wash_sheets
                name: Wash sheets
              - entity: input_boolean.honey_do_done_wash_sheets
                name: Wash sheets complete
              - type: section
              - entity: input_select.honey_do_claim_fold_laundry
                name: Fold laundry
              - entity: input_boolean.honey_do_done_fold_laundry
                name: Fold laundry complete
            card_mod:
              style: |
                ha-card {
                  border-radius: 0 0 28px 28px;
                  background: rgba(245, 235, 224, 0.82);
                  padding-bottom: 8px;
                }

      - type: grid
        view_layout:
          grid-area: projects
        columns: 1
        square: false
        cards:
          - type: custom:mushroom-template-card
            entity: input_boolean.honey_do_done_upstairs_air_condition
            primary: Upstairs Air Condition
            secondary: Ross - Due May 1, 2026
            icon: mdi:air-conditioner
            icon_color: >-
              {{ 'green' if is_state(entity, 'on') else 'blue' }}
            tap_action:
              action: toggle
            badge_icon: >-
              {{ 'mdi:check-circle' if is_state(entity, 'on') else 'mdi:clock-outline' }}
            fill_container: true
          - type: custom:mushroom-template-card
            entity: input_boolean.honey_do_done_kitchen_cabinet_painting
            primary: Kitchen Cabinet Painting
            secondary: Kelly - Due May 1, 2026
            icon: mdi:brush-variant
            icon_color: >-
