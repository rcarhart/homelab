            fill_container: true
          - type: entity
            entity: input_select.grocy_claim_clean_living_room_bathroom
            name: Claim owner
          - type: custom:mushroom-template-card
            primary: Clean Downstairs Bathroom
            secondary: "{{ states('input_select.grocy_claim_clean_downstairs_bathroom') }}"
            icon: mdi:toilet
            icon_color: teal
            tap_action:
              action: call-service
              service: script.honey_do_grocy_complete_chore
              data:
                chore_name: Clean Downstairs Bathroom
                claim_entity: input_select.grocy_claim_clean_downstairs_bathroom
            fill_container: true
          - type: entity
            entity: input_select.grocy_claim_clean_downstairs_bathroom
            name: Claim owner
          - type: custom:mushroom-template-card
            primary: Wash Sheets
            secondary: "{{ states('input_select.grocy_claim_wash_sheets') }}"
            icon: mdi:bed
            icon_color: teal
            tap_action:
              action: call-service
              service: script.honey_do_grocy_complete_chore
              data:
