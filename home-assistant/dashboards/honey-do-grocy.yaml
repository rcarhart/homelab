title: Honey Do Grocy
views:
  - title: Chores
    path: honey-do-grocy
    icon: mdi:clipboard-check-outline
    theme: Skylight Sand
    type: custom:grid-layout
    badges: []
    layout:
      grid-template-columns: repeat(12, minmax(0, 1fr))
      grid-template-areas: |
        "hero hero hero hero hero hero hero hero hero hero hero hero"
        "unclaimed unclaimed unclaimed unclaimed unclaimed unclaimed unclaimed unclaimed unclaimed unclaimed unclaimed unclaimed"
        "ross ross ross ross ross ross kelly kelly kelly kelly kelly kelly"
        "done done done done done done done done done done done done"
      grid-template-rows: min-content min-content minmax(520px, auto) minmax(220px, auto)
      grid-gap: 20px
      margin: 20px
      mediaquery:
        "(max-width: 1100px)":
          grid-template-columns: 1fr
          grid-template-areas: |
            "hero"
            "unclaimed"
            "ross"
            "kelly"
            "done"

    cards:
      - type: markdown
        view_layout:
          grid-area: hero
        content: |
          # Family Chores
          {{ now().strftime('%a, %b %d') }}  -  {{ states('sensor.honey_do_grocy_chores_open') }} open  -  {{ states('sensor.honey_do_grocy_chores_completed') }} completed today
        card_mod:
          style: |
            ha-card {
              padding: 20px 24px;
              border-radius: 28px;
              background: linear-gradient(160deg, rgba(245, 239, 231, 0.96), rgba(235, 225, 214, 0.90));
              border: 1px solid rgba(173, 147, 126, 0.10);
              box-shadow: 0 16px 40px rgba(137, 114, 93, 0.10);
            }
            ha-card h1 {
              margin: 0 0 6px;
              font-size: 2.2rem;
              font-weight: 700;
              color: #5f4d40;
            }
            ha-card p {
              margin: 0;
              color: #7a6656;
              font-size: 1rem;
            }

      - type: vertical-stack
        view_layout:
          grid-area: unclaimed
        cards:
          - type: markdown
            content: |
              ## Up for Grabs
              Unclaimed chores stay here until Ross or Kelly takes them.
            card_mod:
              style: |
                ha-card {
                  padding: 18px 20px;
                  border-radius: 26px;
                  background: rgba(247, 241, 232, 0.92);
                  border: 1px solid rgba(173, 147, 126, 0.08);
                }
          - type: grid
            columns: 2
            square: false
            cards:
              - type: conditional
                conditions:
                  - entity: input_boolean.grocy_done_walk_the_dog
                    state: "off"
                  - entity: input_select.grocy_claim_walk_the_dog
                    state: Unclaimed
                card:
                  type: custom:mushroom-template-card
                  entity: input_select.grocy_claim_walk_the_dog
                  primary: Walk the Dog
                  secondary: Tap to complete, hold to assign
                  icon: mdi:dog-side
                  icon_color: amber
                  tap_action:
                    action: call-service
                    service: script.honey_do_grocy_complete_chore
                    data:
                      chore_name: Walk the Dog
                      complete_entity: input_boolean.grocy_done_walk_the_dog
                  hold_action:
                    action: more-info
                  fill_container: true
              - type: conditional
                conditions:
                  - entity: input_boolean.grocy_done_vacuum
                    state: "off"
                  - entity: input_select.grocy_claim_vacuum
                    state: Unclaimed
                card:
                  type: custom:mushroom-template-card
                  entity: input_select.grocy_claim_vacuum
                  primary: Vacuum
                  secondary: Tap to complete, hold to assign
                  icon: mdi:vacuum
                  icon_color: amber
                  tap_action:
                    action: call-service
                    service: script.honey_do_grocy_complete_chore
                    data:
                      chore_name: Vacuum
                      complete_entity: input_boolean.grocy_done_vacuum
                  hold_action:
                    action: more-info
                  fill_container: true
              - type: conditional
                conditions:
                  - entity: input_boolean.grocy_done_clean_upstairs_bathroom
                    state: "off"
                  - entity: input_select.grocy_claim_clean_upstairs_bathroom
                    state: Unclaimed
                card:
                  type: custom:mushroom-template-card
                  entity: input_select.grocy_claim_clean_upstairs_bathroom
                  primary: Clean Upstairs Bathroom
                  secondary: Tap to complete, hold to assign
                  icon: mdi:shower
                  icon_color: amber
                  tap_action:
                    action: call-service
                    service: script.honey_do_grocy_complete_chore
                    data:
                      chore_name: Clean Upstairs Bathroom
                      complete_entity: input_boolean.grocy_done_clean_upstairs_bathroom
                  hold_action:
                    action: more-info
                  fill_container: true
              - type: conditional
                conditions:
                  - entity: input_boolean.grocy_done_clean_living_room_bathroom
                    state: "off"
                  - entity: input_select.grocy_claim_clean_living_room_bathroom
                    state: Unclaimed
                card:
                  type: custom:mushroom-template-card
                  entity: input_select.grocy_claim_clean_living_room_bathroom
                  primary: Clean Living Room Bathroom
                  secondary: Tap to complete, hold to assign
                  icon: mdi:spray-bottle
                  icon_color: amber
                  tap_action:
                    action: call-service
                    service: script.honey_do_grocy_complete_chore
                    data:
                      chore_name: Clean Living Room Bathroom
                      complete_entity: input_boolean.grocy_done_clean_living_room_bathroom
                  hold_action:
                    action: more-info
                  fill_container: true
              - type: conditional
                conditions:
                  - entity: input_boolean.grocy_done_clean_downstairs_bathroom
                    state: "off"
                  - entity: input_select.grocy_claim_clean_downstairs_bathroom
                    state: Unclaimed
                card:
                  type: custom:mushroom-template-card
                  entity: input_select.grocy_claim_clean_downstairs_bathroom
                  primary: Clean Downstairs Bathroom
                  secondary: Tap to complete, hold to assign
                  icon: mdi:toilet
                  icon_color: amber
                  tap_action:
                    action: call-service
                    service: script.honey_do_grocy_complete_chore
                    data:
                      chore_name: Clean Downstairs Bathroom
                      complete_entity: input_boolean.grocy_done_clean_downstairs_bathroom
                  hold_action:
                    action: more-info
                  fill_container: true
              - type: conditional
                conditions:
                  - entity: input_boolean.grocy_done_wash_sheets
                    state: "off"
                  - entity: input_select.grocy_claim_wash_sheets
                    state: Unclaimed
                card:
                  type: custom:mushroom-template-card
                  entity: input_select.grocy_claim_wash_sheets
                  primary: Wash Sheets
                  secondary: Tap to complete, hold to assign
                  icon: mdi:bed
                  icon_color: amber
                  tap_action:
                    action: call-service
                    service: script.honey_do_grocy_complete_chore
                    data:
                      chore_name: Wash Sheets
                      complete_entity: input_boolean.grocy_done_wash_sheets
                  hold_action:
                    action: more-info
                  fill_container: true

