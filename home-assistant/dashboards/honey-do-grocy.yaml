            fill_container: true
          - type: entity
            entity: input_select.grocy_claim_wash_sheets
            name: Claim owner
          - type: custom:mushroom-template-card
            primary: Fold Laundry
            secondary: "{{ states('input_select.grocy_claim_fold_laundry') }}"
