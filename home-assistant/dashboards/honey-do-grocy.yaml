title: Honey Do Grocy
views:
  - title: Grocy Honey Do
    path: honey-do-grocy
    icon: mdi:clipboard-check-outline
    theme: Skylight Sand
    type: custom:grid-layout
    badges: []
    layout:
      grid-template-columns: repeat(12, minmax(0, 1fr))
      grid-template-areas: |
        "hero hero hero hero hero hero hero hero hero hero hero hero"
        "metrics metrics metrics metrics metrics metrics metrics metrics metrics metrics metrics metrics"
        "chores chores chores chores chores chores projects projects projects projects projects projects"
      grid-template-rows: min-content min-content minmax(420px, auto)
      grid-gap: 20px
      margin: 20px
      mediaquery:
        "(max-width: 1100px)":
          grid-template-columns: 1fr
          grid-template-areas: |
            "hero"
            "metrics"
            "chores"
            "projects"

    cards:
      - type: custom:mushroom-template-card
        view_layout:
          grid-area: hero
        primary: Honey Do Grocy
        secondary: >
          {{ states('sensor.honey_do_grocy_projects_open') }} projects open,
          {{ states('sensor.honey_do_grocy_chores_open') }} chores tracked,
          {{ states('sensor.honey_do_grocy_due_today') }} due today.
        icon: mdi:clipboard-check-outline
        icon_color: brown
        multiline_secondary: true
        fill_container: true
        card_mod:
          style: |
            ha-card {
              padding: 22px 24px;
              border-radius: 32px;
              background: linear-gradient(160deg, rgba(245, 235, 224, 0.94), rgba(227, 213, 202, 0.78));
              border: 1px solid rgba(124, 108, 97, 0.10);
              box-shadow: 0 18px 40px rgba(125, 107, 93, 0.12);
            }

      - type: grid
        view_layout:
          grid-area: metrics
        columns: 4
        square: false
        cards:
          - type: custom:mushroom-template-card
            primary: Projects
            secondary: "{{ states('sensor.honey_do_grocy_projects_open') }} open"
            icon: mdi:hammer-wrench
            icon_color: brown
            fill_container: true
          - type: custom:mushroom-template-card
            primary: Overdue
            secondary: "{{ states('sensor.honey_do_grocy_projects_overdue') }} projects"
            icon: mdi:calendar-alert
            icon_color: pink
            fill_container: true
          - type: custom:mushroom-template-card
            primary: Recurring
            secondary: "{{ states('sensor.honey_do_grocy_chores_open') }} chores"
            icon: mdi:refresh-circle
            icon_color: teal
            fill_container: true
          - type: custom:mushroom-template-card
            primary: Ready To Claim
            secondary: "{{ states('sensor.honey_do_grocy_unassigned_chores') }} unclaimed"
            icon: mdi:account-switch-outline
            icon_color: blue
            fill_container: true

      - type: vertical-stack
        view_layout:
          grid-area: chores
        cards:
          - type: markdown
            content: |
              ## Recurring Chores
              Claim a chore here, then tap the card to mark it done in Grocy.
            card_mod:
              style: |
                ha-card {
                  padding: 18px 20px;
                  border-radius: 28px;
                  background: rgba(245, 235, 224, 0.82);
                }
          - type: custom:mushroom-template-card
            primary: Walk the Dog
            secondary: "{{ states('input_select.grocy_claim_walk_the_dog') }}"
            icon: mdi:dog-side
            icon_color: teal
            tap_action:
              action: call-service
              service: script.honey_do_grocy_complete_chore
              data:
                chore_name: Walk the Dog
                claim_entity: input_select.grocy_claim_walk_the_dog
            fill_container: true
          - type: entity
            entity: input_select.grocy_claim_walk_the_dog
            name: Claim owner
          - type: custom:mushroom-template-card
            primary: Vacuum
            secondary: "{{ states('input_select.grocy_claim_vacuum') }}"
            icon: mdi:vacuum
            icon_color: teal
            tap_action:
              action: call-service
              service: script.honey_do_grocy_complete_chore
              data:
                chore_name: Vacuum
                claim_entity: input_select.grocy_claim_vacuum
            fill_container: true
          - type: entity
            entity: input_select.grocy_claim_vacuum
            name: Claim owner
          - type: custom:mushroom-template-card
            primary: Clean Upstairs Bathroom
            secondary: "{{ states('input_select.grocy_claim_clean_upstairs_bathroom') }}"
            icon: mdi:shower
            icon_color: teal
            tap_action:
              action: call-service
              service: script.honey_do_grocy_complete_chore
              data:
                chore_name: Clean Upstairs Bathroom
                claim_entity: input_select.grocy_claim_clean_upstairs_bathroom
            fill_container: true
          - type: entity
            entity: input_select.grocy_claim_clean_upstairs_bathroom
            name: Claim owner
          - type: custom:mushroom-template-card
            primary: Clean Living Room Bathroom
            secondary: "{{ states('input_select.grocy_claim_clean_living_room_bathroom') }}"
            icon: mdi:spray-bottle
