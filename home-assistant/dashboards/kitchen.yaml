views:
  - title: Kitchen
    path: kitchen
    icon: mdi:chef-hat
    theme: Kitchen Dark
    badges: []
    cards:
      - type: grid
        columns: 4
        square: false
        cards:
          - type: tile
            entity: sensor.kitchen_time
            name: Time
            vertical: true
            tap_action:
              action: none

          - type: tile
            entity: weather.forecast_home
            name: Weather
            vertical: true

          - type: tile
            entity: sensor.mealie_todays_meal
            name: Dinner Tonight
            icon: mdi:silverware-fork-knife
            vertical: true

          - type: tile
            entity: sensor.house_status
            name: House
            vertical: true

      - type: grid
        columns: 2
        square: false
        cards:
          - type: picture-entity
            entity: camera.recipes_rosscarhart_com
            name: Dinner Tonight
            show_state: false
            show_name: true
            tap_action:
              action: url
              url_path: https://recipes.rosscarhart.com

          - type: tile
            entity: todo.shopping_list
            name: Groceries
            icon: mdi:cart-outline

      - type: entities
        title: Kitchen Status
        show_header_toggle: false
        entities:
          - entity: person.ross_carhart
            name: Ross
          - entity: weather.forecast_home
            name: Forecast
          - entity: sensor.mealie_todays_meal
            name: Tonight's Meal