views:
  - title: Kitchen
    path: kitchen
    icon: mdi:chef-hat
    theme: Kitchen Dark
    badges: []
    cards:
      - type: picture-elements
        image: https://recipes.rosscarhart.com/api/media/recipes/{{ states('sensor.mealie_todays_meal_id') }}/images/min-original.webp
        tap_action:
          action: url
          url_path: https://recipes.rosscarhart.com/g/home/r/{{ states('sensor.mealie_todays_meal_slug') }}
        elements:
          - type: state-label
            entity: sensor.mealie_todays_meal
            style:
              left: 50%
              top: 82%
              width: 82%
              transform: translate(-50%, -50%)
              background: rgba(246, 241, 235, 0.84)
              color: '#201814'
              padding: 18px 20px
              border-radius: 26px
              font-size: 2rem
              font-weight: 700
              line-height: 1.1
              text-align: left
              box-shadow: 0 18px 40px rgba(0, 0, 0, 0.24)
          - type: state-label
            entity: sensor.mealie_todays_meal
            attribute: friendly_name
            prefix: 'Open recipe'
            style:
              left: 22%
              top: 94%
              transform: translate(-50%, -50%)
              color: '#C86B3C'
              font-size: 0.95rem
              font-weight: 600
              text-transform: uppercase
              letter-spacing: 0.08em

      - type: markdown
        title: Kitchen
        content: >
          **Tonight's meal**

          {{ states('sensor.mealie_todays_meal') }}

          **Grocery items**

          {% set items = state_attr('sensor.mealie_shopping_items', 'items') %}
          {% if items %}
          {% for item in items %}
          {{ item.display if item.display else ((item.quantity | string) ~ ' ' ~ (item.unit.name if item.unit else '') ~ ' ' ~ (item.food.name if item.food else 'Item')) }}

          {% endfor %}
          {% else %}
          Grocery list is loading.
          {% endif %}

          [Open full shopping list](https://recipes.rosscarhart.com/shopping-lists/426daca7-1a35-4b03-a802-d47b0458e184)

      - type: markdown
        title: Weekly Meal Plan
        content: >
          {% set meals = state_attr('sensor.mealie_weekly_plan', 'items') %}
          {% if meals %}
          {% for item in meals %}
          {% set recipe = item.recipe if item.recipe is defined else none %}
          {% set recipe_name = recipe.name if recipe and recipe.name else (item.title if item.title else 'Meal planned') %}
          {% set recipe_slug = recipe.slug if recipe and recipe.slug else '' %}
          **{{ strptime(item.date, '%Y-%m-%d').strftime('%A') }}** - {{ recipe_name }}
          {% if recipe_slug %}
          [Recipe](https://recipes.rosscarhart.com/g/home/r/{{ recipe_slug }}) | [Cook](https://recipes.rosscarhart.com/g/home/r/{{ recipe_slug }}/cook)
          {% endif %}

          {% endfor %}
          {% else %}
          Weekly plan is loading from Mealie.
          {% endif %}
