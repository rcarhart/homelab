# Mealie REST sensors.
# Official docs currently use the /api/households/... paths for meal plans and
# shopping items. If your Mealie version differs, update the *_url secrets.
- resource: !secret mealie_mealplan_today_url
  method: GET
  headers:
    Authorization: !secret mealie_api_token
  scan_interval: 3600
  sensor:
    - name: mealie_todays_meal
      unique_id: mealie_todays_meal
      value_template: >-
        {{ value_json[0]['recipe']['name'] if value_json and value_json | count > 0 else 'No meal planned' }}

    - name: mealie_todays_meal_id
      unique_id: mealie_todays_meal_id
      value_template: >-
        {{ value_json[0]['recipe']['id'] if value_json and value_json | count > 0 else '' }}

    - name: mealie_todays_meal_slug
      unique_id: mealie_todays_meal_slug
      value_template: >-
        {{ value_json[0]['recipe']['slug'] if value_json and value_json | count > 0 else '' }}
      json_attributes_path: '$[0]'
      json_attributes:
        - entryType
        - date
        - recipe

- resource: !secret mealie_mealplans_url
  method: GET
  headers:
    Authorization: !secret mealie_api_token
  scan_interval: 3600
  sensor:
    - name: mealie_household_mealplans
      unique_id: mealie_household_mealplans
      value_template: >-
        {{ value_json.total if value_json is mapping and 'total' in value_json else 0 }}
      json_attributes:
        - items

- resource: !secret mealie_shopping_items_url
  method: GET
  headers:
    Authorization: !secret mealie_api_token
  scan_interval: 900
  sensor:
    - name: mealie_shopping_items_raw
      unique_id: mealie_shopping_items_raw
      value_template: >-
        {{ value_json.total if value_json is mapping and 'total' in value_json else 0 }}
      json_attributes:
        - items
