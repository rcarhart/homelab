    location /ha/ {
        proxy_pass http://192.168.86.21:8123/;
        proxy_set_header Host 192.168.86.21;
        # Paste your HA long-lived token below (Profile → Security → Long-Lived Access Tokens)
        proxy_set_header Authorization "Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiIzMTlmYWRkYWUwZjA0MWYxYWMxOWI1ZDI4OTdlNTI5MSIsImlhdCI6MTc3NTE3NzkyOSwiZXhwIjoyMDkwNTM3OTI5fQ.rF7ksYrNlU8emVOFaELCgaMqztYrLEYSMoof16Ru3Pk";
