        proxy_set_header Host 192.168.86.47;
        proxy_set_header Authorization "Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJsb25nX3Rva2VuIjp0cnVlLCJpZCI6IjE4YTUwYWMxLWUwNDEtNDgyMi04Mzc3LWZlMWMxMWYyZjk1ZCIsIm5hbWUiOiJtZWFsaWUiLCJpbnRlZ3JhdGlvbl9pZCI6ImdlbmVyaWMiLCJleHAiOjE5MzA4MjE0NDd9.f4pkSLXzl8BUPAQ5BDG-GVgETn9jrSWLnl_xlzVKhdY";
